<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>

    <filter id="glow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="220" fill="#0B1220"/>

  <!-- single neon ring -->
  <g filter="url(#glow)">
    <circle cx="690" cy="610" r="200" fill="none" stroke="url(#neon)" stroke-width="18" opacity="0.92"/>
  </g>

  <!-- cursor outline (monoline) -->
  <path d="M 320 210 L 320 790 L 480 660 L 548 860 L 670 812 L 602 610 L 770 610 Z"
        fill="none" stroke="#FFFFFF" stroke-width="34"
        stroke-linejoin="round" stroke-linecap="round" opacity="0.95"/>
</svg>
